<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rentra - Professional Use Case Diagram</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Trebuchet MS', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 30px 20px;
        }
        
        .container {
            width: 100%;
            max-width: 1600px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 25px;
            color: white;
        }
        
        .header h1 {
            font-size: 36px;
            font-weight: 600;
            margin-bottom: 8px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
            letter-spacing: 0.5px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.95;
            font-weight: 300;
        }
        
        .diagram-wrapper {
            background: white;
            border-radius: 16px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.35);
            padding: 50px;
            margin-bottom: 25px;
            overflow: auto;
        }
        
        svg {
            display: block;
            width: 100%;
            height: auto;
            min-height: 800px;
        }
        
        .button-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .btn {
            padding: 14px 32px;
            font-size: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-decoration: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }
        
        .btn-secondary:hover {
            background: #667eea;
            color: white;
            transform: translateY(-3px);
        }
        
        .footer {
            text-align: center;
            color: white;
            font-size: 13px;
            opacity: 0.9;
        }
    </style>
</head>

                📥 Download as High-Quality PNG
            </button>
            <button class="btn btn-secondary" id="printBtn">
                🖨️ Print / Save as PDF
            </button>
        </div>

            ✨ Professional FYP-Grade Diagram | Ready for Examiner Review
        </div>
    </div>

    <script>
        document.getElementById('downloadBtn').addEventListener('click', async function() {
            const btn = this;
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = '⏳ Generating PNG...';
            
            try {
                const wrapper = document.querySelector('.diagram-wrapper');
                const canvas = await html2canvas(wrapper, {
                    backgroundColor: '#ffffff',
                    scale: 3,
                    useCORS: true,
                    logging: false,
                    width: wrapper.offsetWidth,
                    height: wrapper.offsetHeight
                });
                
                canvas.toBlob(function(blob) {
                    const url = window.URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = 'Rentra-UseCase-Diagram-Professional.png';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    window.URL.revokeObjectURL(url);
                    
                    btn.disabled = false;
                    btn.textContent = originalText;
                }, 'image/png');
            } catch (err) {
                console.error('Error:', err);
                btn.disabled = false;
                btn.textContent = '❌ Error - Try Again';
                setTimeout(() => btn.textContent = originalText, 2000);
            }
        });
        
        document.getElementById('printBtn').addEventListener('click', function() {
            window.print();
        });
    </script>
</body>
